# App-wide secrets shared by backend and websocket.
# Note: service names (postgres, redis) resolve via in-cluster DNS.
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: chat-app
type: Opaque
stringData:
  JWT_SECRET: supersecret
  DATABASE_URL: postgresql://postgres:postgres@postgres:5432/chat
  REDIS_URL: redis://redis:6379
---
# Postgres bootstrap credentials (consumed by the postgres container).
apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: chat-app
type: Opaque
stringData:
  POSTGRES_USER: postgres
  POSTGRES_PASSWORD: postgres
  POSTGRES_DB: chat
